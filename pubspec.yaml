name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  # Broadened range for better package compatibility,
  # especially better_player and pro_video_editor.
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Video playback
  video_player: ^2.8.2
  youtube_player_flutter: ^9.0.0

  # HLS / adaptive streaming — patched local copy
  better_player:
    path: third_party/better_player

  # Reel editing
  pro_video_editor: ^0.2.3

  # FFmpeg — kept because it is actively used.
  # NOTE: This package significantly increases build time and can
  # cause Gradle JVM OOM on Windows. Keep gradle.properties
  # jvmargs at -Xmx4g and parallel=false (see android/gradle.properties).
  ffmpeg_kit_flutter_new: ^4.1.0

  # Audio playback
  audioplayers: ^6.1.0

  # UI / Animations
  animations: ^2.0.11
  page_transition: ^2.1.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  video_thumbnail: ^0.5.3
  connectivity_plus: ^6.0.5
  blurhash_dart: ^1.2.1
  flutter_staggered_animations: ^1.1.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_screenutil: ^5.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Media picking
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # Camera preview (live stream studio)
  camera: ^0.11.0+2

  # Agora realtime audio/video
  agora_rtc_engine: ^6.5.2

  # Local storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image processing
  image: ^4.1.3

  # Video compression
  video_compress: ^3.1.2

  # Permissions
  permission_handler: ^11.1.0

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # Realtime
  socket_io_client: ^2.0.3+1

  # Firebase / Notifications
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2

dependency_overrides:
  better_player:
    path: third_party/better_player

flutter:
  uses-material-design: true